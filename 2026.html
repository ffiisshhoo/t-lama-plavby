<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-LAMA | Vltava 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0b4f6c,#0d6e91,#1697c5);
    color:white;
    text-align:center;
    overflow:hidden;
}

/* jemně pohyblivé pozadí */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.08), transparent 40%);
    animation:moveBg 15s infinite alternate ease-in-out;
}

@keyframes moveBg{
    from{transform:scale(1);}
    to{transform:scale(1.15);}
}

.container{
    position:relative;
    z-index:1;
    padding:30px;
}

.logo{
    width:min(420px,80vw);
    margin-bottom:40px;
    filter:drop-shadow(0 0 25px rgba(255,255,255,0.35));
}

h1{
    font-size:clamp(3rem,8vw,6rem);
    margin-bottom:15px;
    text-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.date{
    font-size:clamp(1.3rem,3vw,2rem);
    margin-bottom:50px;
    opacity:0.95;
}

.coming{
    font-size:clamp(2rem,6vw,4rem);
    font-weight:bold;
    color:#ffd700;
    text-transform:uppercase;
    letter-spacing:5px;
    text-shadow:
        0 0 15px #ffd700,
        0 0 30px #ffd700;
    animation:blink 1.2s infinite;
}

@keyframes blink{
    0%,100%{
        opacity:1;
        transform:scale(1);
    }
    50%{
        opacity:0.2;
        transform:scale(1.08);
    }
}
</style>
</head>
<body>

<div class="container">
    <img src="web_images/logo-lama.png" alt="T-LAMA" class="logo">

    <h1>Vltava 2026</h1>

    <div class="date">
        Těšíme se na letošní plavbu<br>
        26.–29. 6. 2026
    </div>

    <div class="coming">
        IT'S COMING...
    </div>
</div>

</body>
</html>
