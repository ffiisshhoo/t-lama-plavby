<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berounka 2022</title>
    <style>
        :root { --bg-color: #f2f2f2; --text-color: #333; --box-bg: white; --header-bg: #2f6b3f; --card-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #121212; --text-color: #e0e0e0; --box-bg: #1e1e1e; --header-bg: #20472a; }
        }
        body { margin:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-color); transition: 0.3s; }
        
        header { background: linear-gradient(135deg, var(--header-bg), #1b4d29); color: white; padding: 60px 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: relative; }
        header h1 { margin: 0; font-size: 3.5rem; letter-spacing: 2px; text-transform: uppercase; text-shadow: 2px 4px 6px rgba(0,0,0,0.3); }
        header::after { content: "BEROUNKA 2022"; position: absolute; top: 10px; right: 20px; font-size: 0.8rem; opacity: 0.3; pointer-events: none; }
        header p { margin-top: 10px; font-size: 1.2rem; opacity: 0.9; }

        .container { max-width:1200px; margin:auto; padding:20px; }
        .back-button { display:inline-block; background: var(--header-bg); color:white; text-decoration:none; padding:15px 30px; border-radius:30px; margin:20px 0; font-weight:bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .back-button:hover { transform: scale(1.05); background: #1b4d29; }
        
        .text { background: var(--box-bg); padding: 30px; border-radius: 20px; box-shadow: var(--card-shadow); margin-bottom: 30px; line-height: 1.8; }
        
        .galerie { column-count: 4; column-gap: 20px; width: 100%; margin-top: 40px; }
        @media (max-width: 1100px) { .galerie { column-count: 3; } }
        @media (max-width: 800px) { .galerie { column-count: 2; } }
        @media (max-width: 500px) { .galerie { column-count: 1; } }
        .galerie img, .galerie video { display: inline-block; width: 100%; border-radius: 15px; cursor: pointer; margin-bottom: 20px; break-inside: avoid; transition: 0.3s; }
        .galerie img:hover, .galerie video:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .lightbox { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; }
        .close { position:absolute; top:20px; right:30px; color:white; font-size:50px; cursor:pointer; }
        .lightbox img, .lightbox video { max-width: 90%; max-height: 80%; border-radius:10px; }
    </style>
</head>
<body>

<header>
    <h1>🚣 BEROUNKA 2022</h1>
    <p>...naše první společná vodácká výprava...</p>
</header>

<div class="container">
    <a href="index.html" class="back-button">⬅ ZPĚT NA ÚVODNÍ STRÁNKU</a>

    <div class="text">
        <h2>🌊 Berounka 2022</h2>
        <p>Text o roce 2022...</p>
    </div>

    <div class="galerie" id="galerie"></div>

    <div style="text-align: center; margin-top: 50px;">
        <a href="index.html" class="back-button">⬅ ZPĚT NA ÚVODNÍ STRÁNKU</a>
    </div>
</div>

<div id="lightbox" class="lightbox">
    <span class="close" onclick="closePhoto()">✕</span>
    <div class="lightbox-wrapper">
        <img id="lightbox-img" style="display:none;">
        <video id="lightbox-video" controls style="display:none;"></video>
    </div>
</div>

<script>
    const galerie = document.getElementById('galerie');
    const media = [];
    // SEM DOPLŇ ČÍSLA SOUBORŮ, KTERÁ JSOU VIDEA, NAPŘ. [5, 10]
    const videoNumbers = []; 
    
    // NASTAV POČET FOTEK (i<=X)
    for(let i=1; i<=20; i++){
        const isVideo = videoNumbers.includes(i);
        const src = `fotky/2022/${i}.${isVideo ? 'mp4' : 'jpeg'}`;
        media.push({ type: isVideo ? 'video' : 'image', src: src });
        
        if(isVideo){
            const v = document.createElement('video');
            v.src = src; v.muted = true; v.loop = true; v.playsInline = true;
            v.onmouseenter = () => v.play(); v.onmouseleave = () => { v.pause(); v.currentTime = 0; };
            v.onclick = (function(index) { return function() { openLightbox(index); } })(media.length-1);
            galerie.appendChild(v);
        } else {
            const img = document.createElement('img');
            img.src = src;
            img.onclick = (function(index) { return function() { openLightbox(index); } })(media.length-1);
            galerie.appendChild(img);
        }
    }

    function openLightbox(i){
        document.getElementById("lightbox").style.display = "flex";
        const m = media[i];
        const v = document.getElementById("lightbox-video");
        const img = document.getElementById("lightbox-img");
        
        if(m.type === 'video'){
            img.style.display = 'none';
            v.src = m.src; v.style.display = 'block'; v.play();
        } else {
            v.style.display = 'none'; v.pause();
            img.src = m.src; img.style.display = 'block';
        }
    }
    function closePhoto(){
        document.getElementById("lightbox").style.display = "none";
        const v = document.getElementById("lightbox-video"); v.pause(); v.style.display = 'none';
        const img = document.getElementById("lightbox-img"); img.style.display = 'none';
    }
</script>

</body>
</html>
