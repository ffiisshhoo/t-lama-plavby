<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otava 2022</title>
    <style>
        :root { --bg-color: #f2f2f2; --text-color: #333; --box-bg: white; --header-bg: #0b4f6c; --card-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #121212; --text-color: #e0e0e0; --box-bg: #1e1e1e; --header-bg: #073447; }
        }
        body { margin:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-color); transition: 0.3s; }
        
        /* HLAVIČKA S VODOZNAKEM */
        header { background: linear-gradient(135deg, var(--header-bg), #1a73e8); color: white; padding: 60px 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: relative; }
        header h1 { margin: 0; font-size: 3.5rem; letter-spacing: 2px; text-transform: uppercase; text-shadow: 2px 4px 6px rgba(0,0,0,0.3); }
        header::after { content: "OTAVA 2022"; position: absolute; top: 10px; right: 20px; font-size: 0.8rem; opacity: 0.3; pointer-events: none; }
        header p { margin-top: 10px; font-size: 1.2rem; opacity: 0.9; }

        .container { max-width:1200px; margin:auto; padding:20px; }
        .back-button { display:inline-block; background: var(--header-bg); color:white; text-decoration:none; padding:15px 30px; border-radius:30px; margin:20px 0; font-weight:bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .back-button:hover { transform: scale(1.05); background: #1a73e8; }
        
        .text { background: var(--box-bg); padding: 30px; border-radius: 20px; box-shadow: var(--card-shadow); margin-bottom: 30px; line-height: 1.8; }
        .fun-fact { background: #fff3cd; color: #856404; padding: 20px; border-radius: 15px; margin: 25px 0; border-left: 8px solid #ffc107; }
        
        .mapa { text-align:center; margin-bottom:40px; }
        .mapa img { width:100%; max-width:1000px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto 40px auto; }
        .stat-card { background: var(--box-bg); padding: 25px; border-radius: 20px; text-align: center; box-shadow: var(--card-shadow); transition: 0.3s; }
        .value { font-size: 32px; font-weight: bold; color: #f4b400; display: block; }
        
        .galerie { column-count: 4; column-gap: 20px; width: 100%; margin-top: 40px; }
        @media (max-width: 1100px) { .galerie { column-count: 3; } }
        @media (max-width: 800px) { .galerie { column-count: 2; } }
        @media (max-width: 500px) { .galerie { column-count: 1; } }
        .galerie img, .galerie video { display: inline-block; width: 100%; border-radius: 15px; cursor: pointer; margin-bottom: 20px; break-inside: avoid; transition: 0.3s; }
        .galerie img:hover, .galerie video:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
