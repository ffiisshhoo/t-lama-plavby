<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otava 2022</title>

<style>
/* --- DEN / NOC REŽIM --- */
:root {
    --bg-color: #f2f2f2;
    --text-color: #333;
    --box-bg: white;
    --header-bg: #0b4f6c;
    --story-title: #0b5ed7;
    --footer-color: #666;
    --card-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --box-bg: #1e1e1e;
        --header-bg: #073447;
        --story-title: #3fa9f5;
        --footer-color: #aaa;
    }
}

body{ margin:0; font-family:Arial,sans-serif; background: var(--bg-color); color: var(--text-color); transition: 0.3s; }

/* --- ANIMOVANÉ STATISTIKY --- */
.stats-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
}

.stat-card {
    background: var(--box-bg);
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    box-shadow: var(--card-shadow);
    transition: transform 0.3s ease, background 0.3s;
}

.stat-card:hover { transform: translateY(-10px); }
.stat-card .icon { font-size: 35px; margin-bottom: 5px; }
.stat-card .value { font-size: 28px; font-weight: bold; color: #f4b400; display: block; }
.stat-card .label { font-size: 14px; opacity: 0.8; }

/* --- OSTATNÍ STYLY --- */
header{ background: var(--header-bg); color:white; padding:40px 20px; text-align:center; }
.container{ max-width:1200px; margin:auto; padding:20px; }
.text { background: var(--box-bg); padding: 25px; border-radius: 15px; margin-bottom: 30px; }
.mapa{ text-align:center; margin-bottom:40px; }
.mapa img{ width:100%; max-width:1000px; border-radius:15px; box-shadow:0 2px 10px rgba(0,0,0,.2); }
.galerie { column-count: 4; column-gap: 20px; width: 100%; }

@media (max-width: 1100px) { .galerie { column-count: 3; } }
@media (max-width: 800px) { .galerie { column-count: 2; } }
@media (max-width: 500px) { .galerie { column-count: 1; } }

.galerie img, .galerie video {
    display: inline-block; width: 100%; height: auto; border-radius: 15px; 
    box-shadow: 0 2px 10px rgba(0,0,0,.2); transition: 0.3s; cursor: pointer;
    margin-bottom: 20px; break-inside: avoid;
}
.galerie img:hover, .galerie video:hover { transform:scale(1.03); }

/* (Zbytek stylů pro lightbox a vodoznak zachovej podle minulého kódu) */
</style>
</head>
<body>

<header><h1>🚣 Otava 2022</h1></header>

<div class="container">
    <div class="text">
        </div>

    <div class="mapa">
        <img src="fotky/2022/mapa.png" alt="Mapa plavby">
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="icon">📅</div><span class="value">4</span><div class="label">Dny na vodě</div>
        </div>
        <div class="stat-card">
            <div class="icon">🌊</div><span class="value">50+</span><div class="label">Ujetých kilometrů</div>
        </div>
        <div class="stat-card">
            <div class="icon">🚌</div><span class="value">1</span><div class="label">Vlastní autobus</div>
        </div>
        <div class="stat-card">
            <div class="icon">🍺</div><span class="value">X</span><div class="label">Vypitých sudů</div>
        </div>
    </div>

    <div class="galerie" id="galerie"></div>
</div>

<script>
/* (Zde zachovej skript pro galerii, video-hover a den/noc z minulého kódu) */
</script>
</body>
</html>
