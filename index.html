<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Lama z Podmezí</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ececec;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
}

.logo{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:220px;
    opacity:0.25;
}

.logo-left{
    left:30px;
}

.logo-right{
    right:30px;
}

.card{
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    text-align:center;
    max-width:420px;
    width:90%;
    z-index:1;
}

h1{
    color:#6b543d;
    margin-top:0;
}

ul{
    list-style:none;
    padding:0;
}

li{
    margin:12px 0;
}

a{
    color:#333;
    text-decoration:none;
    font-size:24px;
    transition:0.2s;
}

a:hover{
    color:#e91e63;
}

/* Mobil */
@media (max-width:700px){
    .logo{
        width:120px;
        opacity:0.12;
    }

    .logo-left{
        left:-25px;
    }

    .logo-right{
        right:-25px;
    }

    a{
        font-size:20px;
    }
}
</style>
</head>
<body>

<img src="web_images/tlama.png" class="logo logo-left">
<img src="web_images/tlama.png" class="logo logo-right">

<div class="card">
    <h1>🦙 Kde všude už jsme pluli</h1>

    <ul>
        <li><a href="2020.html">2020 – Berounka</a></li>
        <li><a href="2021.html">2021 – Vltava</a></li>
        <li><a href="2022.html">2022 – Otava</a></li>
        <li><a href="2023.html">2023 – Berounka</a></li>
        <li><a href="2024.html">2024 – Ohře</a></li>
        <li><a href="2025.html">2025 – Ohře</a></li>
        <li><a href="2026.html">2026 – Vltava</a></li>
    </ul>
</div>

</body>
</html>
