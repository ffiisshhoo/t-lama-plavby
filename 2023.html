<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berounka 2023</title>
    <style>
        :root { --header-bg: #2f6b3f; --card-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        body { margin:0; font-family:'Segoe UI', sans-serif; background: linear-gradient(135deg, #e0f7fa, #f1f8e9); color: #333; }
        
        /* Nový horní panel */
        .top-nav {
            position: sticky;
            top: 0;
            background-color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 2000;
            font-weight: bold;
        }
        .nav-back { text-decoration: none; color: var(--header-bg); background: #e0f7fa; padding: 8px 16px; border-radius: 20px; }

        header { background: linear-gradient(135deg, var(--header-bg), #1b4d29); color: white; padding: 60px 20px; text-align: center; }
        .container { max-width:1000px; margin:auto; padding:20px; }
        
        .box { background: white; padding: 30px; border-radius: 25px; box-shadow: var(--card-shadow); margin-bottom: 30px; line-height: 1.8; }
        .map-wrapper { text-align: center; margin-bottom: 40px; }
        .map-wrapper img { max-width: 100%; border-radius: 20px; box-shadow: var(--card-shadow); border: 5px solid white; }
        
        .galerie { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 40px; }
        .img-wrapper { position: relative; cursor: pointer; border-radius: 12px; overflow: hidden; height: 150px; }
        .img-wrapper img, .img-wrapper video { width: 100%; height: 100%; object-fit: cover; }
        
        .lightbox { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; }
        .close { position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer; }
        .nav-btn { position:absolute; top:50%; color:white; font-size:50px; cursor:pointer; padding:20px; user-select:none; }
        .prev { left: 10px; } .next { right: 10px; }
        .lightbox-content { max-width: 85vw; max-height: 80vh; border-radius:10px; border: 3px solid white; }
        .lb-watermark { position: absolute; bottom: 20px; right: 20px; color: white; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>

</nav>
